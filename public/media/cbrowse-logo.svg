<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">cBrowse logo mark</title>
  <desc id="desc">A browser window with an orange orbit and control path forming a clean premium mark for cBrowse.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="128" x2="864" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111823"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="panel" x1="250" y1="232" x2="774" y2="784" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182432" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0B121A" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="accent" x1="332" y1="304" x2="718" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB06A"/>
      <stop offset="0.5" stop-color="#FF8B3D"/>
      <stop offset="1" stop-color="#F35F16"/>
    </linearGradient>
    <linearGradient id="accentSoft" x1="316" y1="280" x2="728" y2="744" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB06A" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FF8B3D" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="128" y="120" width="768" height="792" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#02050A" flood-opacity="0.36"/>
    </filter>
    <filter id="glow" x="250" y="236" width="524" height="556" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
