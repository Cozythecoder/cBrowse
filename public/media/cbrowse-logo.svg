    <rect x="192" y="182" width="640" height="640" rx="120" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
    <rect x="228" y="218" width="568" height="74" rx="34" fill="#121B26" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5"/>
    <circle cx="274" cy="255" r="10" fill="#FF8B3D"/>
    <circle cx="308" cy="255" r="10" fill="#FFD089" opacity="0.9"/>
    <circle cx="342" cy="255" r="10" fill="#5FD9A0" opacity="0.92"/>

    <rect x="250" y="330" width="524" height="392" rx="80" fill="#0C141D" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1.5"/>
    <rect x="294" y="374" width="438" height="304" rx="58" fill="url(#accentSoft)"/>

    <path d="M324 472C324 392.558 388.558 328 468 328H556C635.442 328 700 392.558 700 472C700 551.442 635.442 616 556 616H500C420.558 616 356 680.558 356 760" stroke="url(#accent)" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M322 470C322 391.454 386.454 327 465 327H557C636.112 327 700 390.888 700 470C700 549.112 636.112 613 557 613H503C425.268 613 362 676.268 362 754" stroke="#FFF1E7" stroke-opacity="0.16" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

