    </g>
    <circle cx="662" cy="666" r="18" fill="url(#accent)"/>
    <path d="M662 560V648" stroke="url(#accent)" stroke-width="16" stroke-linecap="round"/>
    <path d="M702 704H770" stroke="#5FD9A0" stroke-width="16" stroke-linecap="round"/>
    <path d="M554 704H622" stroke="#5FD9A0" stroke-width="16" stroke-linecap="round"/>
    <path d="M612 756L662 706L712 756" stroke="#FFD089" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
