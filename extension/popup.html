<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cBrowse</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111a;
        --panel: rgba(9, 23, 35, 0.92);
        --line: rgba(132, 163, 184, 0.18);
        --text: #f5f7fa;
        --muted: #9fb1bf;
        --accent: #ff8c42;
        --good: #65d6a4;
        --warn: #ffd166;
        --bad: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 312px;
        background:
          radial-gradient(circle at top right, rgba(255, 140, 66, 0.18), transparent 36%),
          var(--bg);
        color: var(--text);
        font: 13px/1.42 "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      }

      .wrap {
        padding: 12px;
      }

      .card,
      pre {
        border: 1px solid var(--line);
        background: var(--panel);
        backdrop-filter: blur(14px);
      }

      .card {
        border-radius: 18px;
        padding: 14px;
      }

      .head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .title {
        margin: 0;
        font: 600 17px/1.05 "Iowan Old Style", "Palatino Linotype", serif;
        letter-spacing: -0.02em;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 11px;
        white-space: nowrap;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--warn);
      }

      .badge[data-status="connected"] {
        color: var(--good);
      }

      .badge[data-status="connected"] .dot {
        background: var(--good);
      }

      .badge[data-status="connecting"],
      .badge[data-status="waiting_for_bridge"] {
        color: var(--warn);
      }

      .badge[data-status="error"],
      .badge[data-status="disconnected"] {
        color: var(--bad);
      }

      .badge[data-status="error"] .dot,
      .badge[data-status="disconnected"] .dot {
        background: var(--bad);
      }

      .summary,
      .hint {
        margin: 10px 0 0;
        color: var(--muted);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        border: 0;
        border-radius: 12px;
        min-height: 40px;
        padding: 9px 11px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        text-align: left;
        cursor: pointer;
        font: inherit;
      }

      button.primary {
        background: linear-gradient(135deg, #ff8c42, #ff6b35);
        color: #170b04;
        font-weight: 700;
      }

      .subactions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
      }

      .hidden {
        display: none;
      }

      pre {
        margin: 8px 0 0;
        max-height: 120px;
        overflow: auto;
        padding: 10px;
        border-radius: 14px;
        color: #d6dde5;
        font: 11px/1.45 "IBM Plex Mono", "SFMono-Regular", monospace;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <div class="head">
          <h1 class="title">cBrowse</h1>
          <div id="bridge-badge" class="badge">
            <span class="dot"></span>
            <span id="bridge-label">Loading</span>
          </div>
        </div>

        <p id="summary" class="summary">Loading…</p>
        <p id="hint" class="hint">Open setup to copy your private cBrowse MCP URL.</p>

        <div class="actions">
          <button id="copy-mcp-line" class="primary">Copy MCP</button>
          <button id="open-setup-page">Open setup</button>
        </div>

        <div class="subactions">
          <button id="reconnect-bridge">Retry</button>
          <button id="toggle-inspect">Inspect</button>
        </div>

        <pre id="output" class="hidden">No page snapshot yet.</pre>
      </section>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
