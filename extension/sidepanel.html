<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cBrowse</title>
    <style>
      body {
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
        font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
      }
      .wrap {
        padding: 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      .sub {
        margin: 0 0 16px;
        color: #94a3b8;
      }
      .panel {
        margin-bottom: 14px;
        padding: 14px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.2);
        white-space: pre-wrap;
      }
      .logs {
        display: grid;
        gap: 10px;
      }
      .locks {
        display: grid;
        gap: 10px;
        margin-bottom: 14px;
      }
      .lock {
        padding: 12px;
        border-radius: 12px;
        background: rgba(51, 65, 85, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.14);
      }
      .log {
        padding: 12px;
        border-radius: 12px;
        background: rgba(30, 41, 59, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.14);
      }
      .time {
        color: #94a3b8;
        font-size: 12px;
      }
      .level {
        display: inline-block;
        margin-right: 8px;
        font-size: 12px;
        color: #7dd3fc;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>cBrowse</h1>
      <p class="sub">Signed-in browser state, tab locks, and session activity.</p>
      <div id="summary" class="panel">Loading…</div>
      <div id="locks" class="locks"></div>
      <div id="logs" class="logs"></div>
    </div>
    <script type="module" src="sidepanel.js"></script>
  </body>
  </html>
