services:
  cbrowse:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CBROWSE_HOST: 0.0.0.0
      CBROWSE_PORT: 8787
      CBROWSE_HTTP_HOST: 0.0.0.0
      CBROWSE_HTTP_PORT: 8788
      CBROWSE_MCP_PATH: /mcp
    expose:
      - "8787"
      - "8788"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - cbrowse
    environment:
      DOMAINS: ${DOMAINS}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
